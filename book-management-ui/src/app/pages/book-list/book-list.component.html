<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>📚 Book Management</h2>

        <a routerLink="/add-book" class="btn btn-primary">
+ Add Book
</a>

    </div>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Publication Date</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let book of books">

                <td>{{book.id}}</td>
                <td>{{book.title}}</td>
                <td>{{book.author}}</td>
                <td>{{book.isbn}}</td>
                <td>{{book.publicationDate | date}}</td>

                <td>

                    <a class="btn btn-warning btn-sm me-2" [routerLink]="['/edit-book',book.id]">
Edit
</a>

                    <button class="btn btn-danger btn-sm" (click)="deleteBook(book.id!)">
Delete
</button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
